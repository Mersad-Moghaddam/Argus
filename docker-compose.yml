version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: argus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: argus
      MYSQL_USER: argus
      MYSQL_PASSWORD: argus
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/migrations/0002_outbox.up.sql:/docker-entrypoint-initdb.d/02-outbox.sql:ro

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
