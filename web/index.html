<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-6xl mx-auto px-4 py-8 space-y-6">
    <header class="mb-2">
      <h1 class="text-3xl font-semibold">Argus Uptime Checker</h1>
      <p class="text-slate-300 mt-1">Monitor websites, inspect checks, and track detailed system + worker logs.</p>
    </header>

    <section class="bg-slate-900 rounded-xl p-5 shadow-lg border border-slate-800">
      <h2 class="text-xl font-semibold mb-4">Add Website</h2>
      <form id="websiteForm" class="grid gap-4 md:grid-cols-3">
        <input id="url" type="url" required placeholder="https://example.com" class="md:col-span-2 rounded-lg bg-slate-950 border border-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="interval" type="number" min="10" required value="30" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Interval (sec)" />
        <button class="md:col-span-3 rounded-lg bg-indigo-600 hover:bg-indigo-500 px-4 py-2 font-medium" type="submit">Add Website</button>
      </form>
      <p id="formMessage" class="mt-3 text-sm"></p>
    </section>

    <section class="bg-slate-900 rounded-xl p-5 shadow-lg border border-slate-800">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold">Tracked Websites</h2>
        <button id="refreshBtn" class="rounded-lg border border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-800">Refresh</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="text-slate-300 border-b border-slate-700">
              <th class="py-2">URL</th>
              <th class="py-2">Interval</th>
              <th class="py-2">Status</th>
              <th class="py-2">Last Check</th>
              <th class="py-2">Actions</th>
            </tr>
          </thead>
          <tbody id="websiteTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="bg-slate-900 rounded-xl p-5 shadow-lg border border-slate-800">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
        <div>
          <h2 class="text-xl font-semibold">System & Worker Logs</h2>
          <p class="text-xs text-slate-400">Detailed runtime events showing how each website is monitored by Asynq workers.</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <select id="logFilterWebsite" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2 text-sm"></select>
          <select id="logFilterLevel" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2 text-sm">
            <option value="all">All levels</option>
            <option value="info">Info</option>
            <option value="warn">Warning</option>
            <option value="error">Error</option>
          </select>
          <button id="refreshLogsBtn" class="rounded-lg border border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-800">Refresh Logs</button>
        </div>
      </div>
      <div id="logsContainer" class="space-y-2 max-h-[420px] overflow-y-auto pr-1"></div>
    </section>
  </main>

  <script>
    const API_BASE = '/api/websites';
    const LOGS_BASE = '/api/logs';

    const tableBody = document.getElementById('websiteTableBody');
    const form = document.getElementById('websiteForm');
    const formMessage = document.getElementById('formMessage');
    const refreshBtn = document.getElementById('refreshBtn');

    const logsContainer = document.getElementById('logsContainer');
    const refreshLogsBtn = document.getElementById('refreshLogsBtn');
    const logFilterWebsite = document.getElementById('logFilterWebsite');
    const logFilterLevel = document.getElementById('logFilterLevel');

    let websitesCache = [];

    const statusPill = (status) => {
      const colors = { up: 'bg-emerald-500/20 text-emerald-300', down: 'bg-rose-500/20 text-rose-300', pending: 'bg-amber-500/20 text-amber-300' };
      const cls = colors[status] || colors.pending;
      return `<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium ${cls}">${status}</span>`;
    };

    const levelPill = (level) => {
      const colors = { info: 'bg-sky-500/20 text-sky-300', warn: 'bg-amber-500/20 text-amber-300', error: 'bg-rose-500/20 text-rose-300' };
      const cls = colors[level] || colors.info;
      return `<span class="inline-flex px-2 py-1 rounded-full text-xs font-medium ${cls}">${level.toUpperCase()}</span>`;
    };

    const fmtDate = (value) => value ? new Date(value).toLocaleString() : '-';

    async function fetchWebsites() {
      const response = await fetch(API_BASE);
      if (!response.ok) throw new Error('Failed to load websites');
      return response.json();
    }

    async function fetchLogs() {
      const params = new URLSearchParams({ limit: '250' });
      if (logFilterWebsite.value !== 'all') params.set('websiteId', logFilterWebsite.value);

      const response = await fetch(`${LOGS_BASE}?${params.toString()}`);
      if (!response.ok) throw new Error('Failed to load logs');
      return response.json();
    }

    function buildLogFilters() {
      const current = logFilterWebsite.value || 'all';
      const options = ['<option value="all">All websites</option>'];
      websitesCache.forEach((site) => options.push(`<option value="${site.id}">#${site.id} ${site.url}</option>`));
      logFilterWebsite.innerHTML = options.join('');
      logFilterWebsite.value = options.some((o) => o.includes(`value="${current}"`)) ? current : 'all';
    }

    function renderLogDetails(details = {}) {
      const entries = Object.entries(details);
      if (!entries.length) return '';
      return `<div class="mt-2 grid md:grid-cols-2 gap-1 text-xs text-slate-300">${entries.map(([key, value]) => `<div><span class="text-slate-500">${key}:</span> ${value}</div>`).join('')}</div>`;
    }

    async function renderLogs() {
      try {
        const logs = await fetchLogs();
        const levelFilter = logFilterLevel.value;
        const filtered = levelFilter === 'all' ? logs : logs.filter((item) => item.level === levelFilter);

        if (filtered.length === 0) {
          logsContainer.innerHTML = '<div class="rounded-lg border border-slate-700 p-4 text-sm text-slate-400">No logs available for current filters.</div>';
          return;
        }

        logsContainer.innerHTML = filtered.map((item) => `
          <article class="rounded-lg border border-slate-800 bg-slate-950 p-3 hover:border-slate-700 transition-colors">
            <div class="flex flex-wrap items-center gap-2 mb-1">
              ${levelPill(item.level)}
              <span class="text-xs text-slate-400">${fmtDate(item.timestamp)}</span>
              <span class="text-xs text-indigo-300 uppercase tracking-wide">${item.source}</span>
              <span class="text-xs text-slate-400">${item.action}</span>
              ${item.websiteId ? `<span class="text-xs text-emerald-300">Website #${item.websiteId}</span>` : ''}
            </div>
            <p class="text-sm text-slate-100">${item.message}</p>
            ${renderLogDetails(item.details)}
          </article>
        `).join('');
      } catch (error) {
        logsContainer.innerHTML = `<div class="rounded-lg border border-rose-700 bg-rose-900/20 p-4 text-sm text-rose-300">${error.message}</div>`;
      }
    }

    async function renderWebsites() {
      try {
        websitesCache = await fetchWebsites();
        buildLogFilters();

        if (websitesCache.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="5" class="py-5 text-slate-400">No websites configured yet.</td></tr>';
          return;
        }

        tableBody.innerHTML = websitesCache.map((site) => `
          <tr class="border-b border-slate-800">
            <td class="py-3 pr-2"><a class="text-indigo-300 hover:text-indigo-200" href="${site.url}" target="_blank" rel="noreferrer">${site.url}</a></td>
            <td class="py-3 pr-2">${site.checkInterval}s</td>
            <td class="py-3 pr-2">${statusPill(site.status)}</td>
            <td class="py-3 pr-2">${fmtDate(site.lastCheckedAt)}</td>
            <td class="py-3 pr-2"><button data-id="${site.id}" class="delete-btn text-sm rounded-md border border-rose-400 px-3 py-1 text-rose-300 hover:bg-rose-500/20">Delete</button></td>
          </tr>
        `).join('');
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="5" class="py-5 text-rose-300">${error.message}</td></tr>`;
      }
    }

    async function createWebsite(url, checkInterval) {
      const response = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, checkInterval })
      });
      if (!response.ok) {
        const payload = await response.json();
        throw new Error(payload.error || 'Failed to create website');
      }
    }

    async function deleteWebsite(id) {
      const response = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
      if (!response.ok) throw new Error('Failed to delete website');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      formMessage.textContent = '';
      const url = document.getElementById('url').value.trim();
      const checkInterval = Number(document.getElementById('interval').value);
      try {
        await createWebsite(url, checkInterval);
        form.reset();
        document.getElementById('interval').value = '30';
        formMessage.textContent = 'Website added successfully.';
        formMessage.className = 'mt-3 text-sm text-emerald-300';
        await renderWebsites();
        await renderLogs();
      } catch (error) {
        formMessage.textContent = error.message;
        formMessage.className = 'mt-3 text-sm text-rose-300';
      }
    });

    tableBody.addEventListener('click', async (event) => {
      const button = event.target.closest('.delete-btn');
      if (!button) return;
      try {
        await deleteWebsite(button.dataset.id);
        await renderWebsites();
        await renderLogs();
      } catch (error) {
        alert(error.message);
      }
    });

    refreshBtn.addEventListener('click', async () => {
      await renderWebsites();
      await renderLogs();
    });
    refreshLogsBtn.addEventListener('click', renderLogs);
    logFilterWebsite.addEventListener('change', renderLogs);
    logFilterLevel.addEventListener('change', renderLogs);

    async function bootstrap() {
      await renderWebsites();
      await renderLogs();
    }

    bootstrap();
    setInterval(renderWebsites, 20000);
    setInterval(renderLogs, 7000);
  </script>
</body>
</html>
