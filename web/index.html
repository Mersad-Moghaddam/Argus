<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <main class="max-w-7xl mx-auto px-4 py-8 space-y-6">
    <header>
      <h1 class="text-3xl font-semibold">Argus Uptime Checker</h1>
      <p class="text-slate-300 mt-1">Production-grade monitoring with incidents, alerts, status pages, maintenance windows, and advanced monitor types.</p>
    </header>

    <section class="grid lg:grid-cols-3 gap-4">
      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800 lg:col-span-2">
        <h2 class="text-lg font-semibold mb-3">Add Monitor</h2>
        <form id="websiteForm" class="grid md:grid-cols-2 gap-3">
          <input id="url" type="url" required placeholder="https://example.com" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="healthUrl" type="url" placeholder="Optional health URL" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="interval" type="number" min="10" required value="30" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" placeholder="Interval (sec)" />
          <select id="monitorType" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2">
            <option value="http_status">HTTP Status</option>
            <option value="keyword">Keyword</option>
            <option value="heartbeat">Heartbeat</option>
            <option value="tls_expiry">TLS Expiry</option>
          </select>
          <input id="expectedKeyword" placeholder="Keyword (keyword monitors)" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="tlsDays" type="number" min="1" value="14" placeholder="TLS threshold days" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="heartbeatGrace" type="number" min="10" value="60" placeholder="Heartbeat grace sec" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="statusPageId" type="number" min="1" placeholder="Status Page ID (optional)" class="rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <button class="md:col-span-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 px-4 py-2 font-medium" type="submit">Create Monitor</button>
        </form>
        <p id="formMessage" class="text-sm mt-2"></p>
      </div>

      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800">
        <h2 class="text-lg font-semibold mb-3">Alert Channel</h2>
        <form id="alertForm" class="space-y-3">
          <input id="alertName" required placeholder="Primary webhook" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <select id="alertType" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2">
            <option value="webhook">Webhook</option><option value="slack">Slack Webhook</option><option value="email">Email (placeholder)</option>
          </select>
          <input id="alertTarget" required placeholder="https://hooks..." class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <button class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2">Add Channel</button>
        </form>
      </div>
    </section>

    <section class="grid lg:grid-cols-2 gap-4">
      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800">
        <h2 class="text-lg font-semibold mb-3">Maintenance Window</h2>
        <form id="maintenanceForm" class="space-y-3">
          <input id="mwWebsiteId" type="number" min="1" placeholder="Website ID (empty = global)" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="mwStartsAt" type="datetime-local" required class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="mwEndsAt" type="datetime-local" required class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="mwReason" placeholder="Reason" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <button class="w-full rounded-lg bg-amber-600 hover:bg-amber-500 px-4 py-2">Create Window</button>
        </form>
      </div>

      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800">
        <h2 class="text-lg font-semibold mb-3">Status Pages</h2>
        <form id="statusPageForm" class="space-y-3 mb-3">
          <input id="statusSlug" required placeholder="public-slug" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <input id="statusTitle" required placeholder="Acme Platform Status" class="w-full rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" />
          <button class="w-full rounded-lg bg-sky-600 hover:bg-sky-500 px-4 py-2">Create Status Page</button>
        </form>
        <div id="statusPagesList" class="text-sm text-slate-300 space-y-1"></div>
      </div>
    </section>

    <section class="bg-slate-900 rounded-xl p-5 border border-slate-800">
      <h2 class="text-xl font-semibold mb-3">Tracked Websites</h2>
      <div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead><tr class="text-slate-300 border-b border-slate-700"><th class="py-2">ID</th><th class="py-2">URL</th><th class="py-2">Type</th><th class="py-2">Status</th><th class="py-2">Last Check</th><th class="py-2">Actions</th></tr></thead><tbody id="websiteTableBody"></tbody></table></div>
    </section>

    <section class="grid lg:grid-cols-2 gap-4">
      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800">
        <h2 class="text-xl font-semibold mb-3">Incidents</h2>
        <div id="incidentList" class="space-y-2 text-sm"></div>
      </div>
      <div class="bg-slate-900 rounded-xl p-5 border border-slate-800">
        <h2 class="text-xl font-semibold mb-3">Public Status Preview</h2>
        <div class="flex gap-2 mb-3"><input id="statusPreviewSlug" placeholder="slug" class="flex-1 rounded-lg bg-slate-950 border border-slate-700 px-3 py-2" /><button id="statusPreviewBtn" class="rounded-lg bg-indigo-600 px-3">Load</button></div>
        <pre id="statusPreview" class="bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs whitespace-pre-wrap"></pre>
      </div>
    </section>
  </main>

  <script>
    const API = {
      websites: '/api/websites', incidents: '/api/incidents', alertChannels: '/api/alert-channels', maintenance: '/api/maintenance-windows', statusPages: '/api/status-pages', publicStatus: (slug) => `/api/public/status/${slug}`
    };

    const tableBody = document.getElementById('websiteTableBody');
    const formMessage = document.getElementById('formMessage');

    const jsonHeaders = { 'Content-Type': 'application/json' };

    async function fetchJSON(url) { const r = await fetch(url); if (!r.ok) throw new Error(await r.text()); return r.json(); }
    async function postJSON(url, payload) { const r = await fetch(url, { method: 'POST', headers: jsonHeaders, body: JSON.stringify(payload) }); if (!r.ok) { const t = await r.text(); throw new Error(t); } return r.status === 204 ? null : r.json(); }

    const statusPill = (status) => `<span class="px-2 py-1 rounded text-xs ${status === 'up' ? 'bg-emerald-500/20 text-emerald-300' : status === 'down' ? 'bg-rose-500/20 text-rose-300' : 'bg-amber-500/20 text-amber-300'}">${status}</span>`;

    async function renderWebsites() {
      const sites = await fetchJSON(API.websites);
      if (!sites.length) { tableBody.innerHTML = '<tr><td colspan="6" class="py-3 text-slate-400">No monitors yet.</td></tr>'; return; }
      tableBody.innerHTML = sites.map((site) => `<tr class="border-b border-slate-800"><td class="py-2">${site.id}</td><td class="py-2">${site.url}</td><td class="py-2">${site.monitorType}</td><td class="py-2">${statusPill(site.status)}</td><td class="py-2">${site.lastCheckedAt ? new Date(site.lastCheckedAt).toLocaleString() : '-'}</td><td class="py-2"><button data-id="${site.id}" class="heartbeat-btn mr-2 text-xs border border-sky-500 text-sky-300 px-2 py-1 rounded">Heartbeat</button><button data-id="${site.id}" class="delete-btn text-xs border border-rose-500 text-rose-300 px-2 py-1 rounded">Delete</button></td></tr>`).join('');
    }

    async function renderIncidents() {
      const list = document.getElementById('incidentList');
      const incidents = await fetchJSON(`${API.incidents}?limit=30`);
      list.innerHTML = incidents.length ? incidents.map((i) => `<div class="p-2 rounded border border-slate-800 bg-slate-950"><div class="text-slate-200">Incident #${i.id} / Website #${i.websiteId}</div><div class="text-slate-400">${i.state} • started ${new Date(i.startedAt).toLocaleString()}</div><div class="text-rose-300">${i.lastFailureReason || ''}</div></div>`).join('') : '<div class="text-slate-400">No incidents.</div>';
    }

    async function renderStatusPages() {
      const box = document.getElementById('statusPagesList');
      const pages = await fetchJSON(API.statusPages);
      box.innerHTML = pages.length ? pages.map((p) => `<div>#${p.id} <span class="text-sky-300">${p.slug}</span> — ${p.title}</div>`).join('') : '<div class="text-slate-400">No status pages.</div>';
    }

    document.getElementById('websiteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await postJSON(API.websites, {
          url: document.getElementById('url').value.trim(),
          healthCheckUrl: document.getElementById('healthUrl').value.trim() || null,
          checkInterval: Number(document.getElementById('interval').value),
          monitorType: document.getElementById('monitorType').value,
          expectedKeyword: document.getElementById('expectedKeyword').value.trim() || null,
          tlsExpiryThresholdDays: Number(document.getElementById('tlsDays').value),
          heartbeatGraceSeconds: Number(document.getElementById('heartbeatGrace').value),
          statusPageId: document.getElementById('statusPageId').value ? Number(document.getElementById('statusPageId').value) : null
        });
        formMessage.className = 'text-sm text-emerald-300 mt-2'; formMessage.textContent = 'Monitor created';
        await refreshAll();
      } catch (err) { formMessage.className = 'text-sm text-rose-300 mt-2'; formMessage.textContent = err.message; }
    });

    document.getElementById('alertForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await postJSON(API.alertChannels, { name: alertName.value.trim(), channelType: alertType.value, target: alertTarget.value.trim() });
      alertName.value = ''; alertTarget.value = '';
    });

    document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await postJSON(API.maintenance, {
        websiteId: mwWebsiteId.value ? Number(mwWebsiteId.value) : null,
        startsAt: new Date(mwStartsAt.value).toISOString(),
        endsAt: new Date(mwEndsAt.value).toISOString(),
        reason: mwReason.value.trim() || null
      });
    });

    document.getElementById('statusPageForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await postJSON(API.statusPages, { slug: statusSlug.value.trim(), title: statusTitle.value.trim() });
      await renderStatusPages();
    });

    tableBody.addEventListener('click', async (event) => {
      const hb = event.target.closest('.heartbeat-btn');
      if (hb) { await fetch(`${API.websites}/${hb.dataset.id}/heartbeat`, { method: 'POST' }); await refreshAll(); return; }
      const del = event.target.closest('.delete-btn');
      if (del) { await fetch(`${API.websites}/${del.dataset.id}`, { method: 'DELETE' }); await refreshAll(); }
    });

    document.getElementById('statusPreviewBtn').addEventListener('click', async () => {
      const slug = document.getElementById('statusPreviewSlug').value.trim();
      const data = await fetchJSON(API.publicStatus(slug));
      document.getElementById('statusPreview').textContent = JSON.stringify(data, null, 2);
    });

    async function refreshAll() {
      await Promise.all([renderWebsites(), renderIncidents(), renderStatusPages()]);
    }

    refreshAll();
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
