<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Argus main page preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#020b2d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111f3f"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="120" y="90" fill="#e2e8f0" font-size="48" font-family="Inter,Arial,sans-serif" font-weight="700">Argus Uptime Checker</text>
  <text x="120" y="130" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Main admin page preview with forms, websites table, and logs panel.</text>

  <rect x="120" y="170" width="560" height="210" rx="16" fill="url(#card)" stroke="#334155"/>
  <text x="145" y="215" fill="#e2e8f0" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="600">Add Website (Main URL)</text>
  <rect x="145" y="235" width="510" height="52" rx="10" fill="#020617" stroke="#334155"/>
  <rect x="145" y="300" width="510" height="52" rx="10" fill="#4f46e5"/>

  <rect x="720" y="170" width="560" height="210" rx="16" fill="url(#card)" stroke="#334155"/>
  <text x="745" y="215" fill="#e2e8f0" font-size="34" font-family="Inter,Arial,sans-serif" font-weight="600">Add Website + Health Check</text>
  <rect x="745" y="235" width="510" height="52" rx="10" fill="#020617" stroke="#334155"/>
  <rect x="745" y="300" width="510" height="52" rx="10" fill="#059669"/>

  <rect x="120" y="410" width="1160" height="220" rx="16" fill="url(#card)" stroke="#334155"/>
  <text x="145" y="455" fill="#e2e8f0" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">Tracked Websites</text>
  <line x1="145" y1="495" x2="1255" y2="495" stroke="#334155"/>
  <text x="145" y="535" fill="#94a3b8" font-size="24" font-family="Inter,Arial,sans-serif">Website · Check Target · Ping · Interval · Status · Last Check · Actions</text>

  <rect x="120" y="660" width="1160" height="160" rx="16" fill="url(#card)" stroke="#334155"/>
  <text x="145" y="705" fill="#e2e8f0" font-size="38" font-family="Inter,Arial,sans-serif" font-weight="700">System &amp; Worker Logs</text>
  <rect x="145" y="725" width="1110" height="70" rx="10" fill="#0b1327" stroke="#334155"/>
</svg>
